    <script>
        // Neural Network Particle Animation
        (function () {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const PARTICLE_COUNT = 55;
            const CONNECTION_DISTANCE = 130;
            const MOUSE_INFLUENCE_DISTANCE = 180;

            let mouseX = -1000;
            let mouseY = -1000;
            let animationId;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.35,
                        vy: (Math.random() - 0.5) * 0.35,
                        radius: Math.random() * 2.2 + 1.2,
                        baseRadius: 0,
                        pulseOffset: Math.random() * Math.PI * 2,
                        opacity: Math.random() * 0.5 + 0.35,
                    });
                    particles[i].baseRadius = particles[i].radius;
                }
            }

            function drawParticle(p) {
                // Outer glow
                const glowGradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 4);
                glowGradient.addColorStop(0, 'rgba(147, 197, 253, 0.7)');
                glowGradient.addColorStop(0.4, 'rgba(129, 140, 248, 0.3)');
                glowGradient.addColorStop(1, 'rgba(129, 140, 248, 0)');
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * 4, 0, Math.PI * 2);
                ctx.fillStyle = glowGradient;
                ctx.fill();

                // Core
                const coreGradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                coreGradient.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
                coreGradient.addColorStop(0.5, 'rgba(191, 219, 254, 0.8)');
                coreGradient.addColorStop(1, 'rgba(147, 197, 253, 0.2)');
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = coreGradient;
                ctx.fill();
            }

            function drawConnection(p1, p2, distance) {
                const maxDist = CONNECTION_DISTANCE;
                const opacity = (1 - distance / maxDist) * 0.28;
                if (opacity <= 0) return;

                const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                gradient.addColorStop(0, `rgba(147, 197, 253, ${opacity})`);
                gradient.addColorStop(0.5, `rgba(188, 170, 255, ${opacity * 1.3})`);
                gradient.addColorStop(1, `rgba(147, 197, 253, ${opacity})`);

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 0.6;
                ctx.stroke();
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Update and draw particles
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];

                    // Subtle pulse
                    p.radius = p.baseRadius + Math.sin(Date.now() * 0.003 + p.pulseOffset) * 0.5;

                    // Move
                    p.x += p.vx;
                    p.y += p.vy;

                    // Wrap around edges with smooth transition
                    const margin = 50;
                    if (p.x < -margin) p.x = canvas.width + margin;
                    if (p.x > canvas.width + margin) p.x = -margin;
                    if (p.y < -margin) p.y = canvas.height + margin;
                    if (p.y > canvas.height + margin) p.y = -margin;

                    // Gentle mouse repulsion
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const distToMouse = Math.sqrt(dx * dx + dy * dy);
                    if (distToMouse < MOUSE_INFLUENCE_DISTANCE && mouseX > 0) {
                        const force = (MOUSE_INFLUENCE_DISTANCE - distToMouse) / MOUSE_INFLUENCE_DISTANCE;
                        const angle = Math.atan2(dy, dx);
                        p.vx += Math.cos(angle) * force * 0.03;
                        p.vy += Math.sin(angle) * force * 0.03;
                    }

                    // Dampen velocity
                    p.vx *= 0.9995;
                    p.vy *= 0.9995;

                    // Speed limit
                    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    if (speed > 0.7) {
                        p.vx = (p.vx / speed) * 0.7;
                        p.vy = (p.vy / speed) * 0.7;
                    }

                    drawParticle(p);
                }

                // Draw connections
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < CONNECTION_DISTANCE) {
                            drawConnection(particles[i], particles[j], distance);
                        }
                    }
                }

                animationId = requestAnimationFrame(animate);
            }

            function handleMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }

            function handleTouchMove(e) {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            }

            function handleMouseLeave() {
                mouseX = -1000;
                mouseY = -1000;
            }

            function init() {
                resizeCanvas();
                createParticles();
                animate();

                window.addEventListener('resize', () => {
                    resizeCanvas();
                    createParticles();
                });

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('touchmove', handleTouchMove, { passive: true });
                window.addEventListener('mouseleave', handleMouseLeave);
                window.addEventListener('touchend', handleMouseLeave);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
